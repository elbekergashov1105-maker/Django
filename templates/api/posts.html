{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <br>
    <a href="{% url 'home' %}"><button type="submit">Home</button></a><br>
    <style>
       
        body {
            background-image: url("/static/images/fon.jpg");
            background-size: cover;  
            background-attachment: fixed;  
           
        }
        button {
            color: rgb(255, 0, 111);
        }
    </style>
    <br>
    <a href="{% url 'post_create' %}"> <button type="submit">Post qo'shish</button></a><br><br>
    <form method="">
        <input type="text" name="q" placeholder="Qidirish..." value="{{ query |default:'' }}">
        <button type="submit">Qidirish</button>
    </form>
    {% for post in page_obj %}
        <a href="{% url 'post_detail' post.id %}"><h2>{{ post.title }}</h2></a>
        <p>{{ post.content }}</p>
        <small>{{ post.created_at }}</small>
         <br>
    {% endfor %}
    <h2>Postlar mavjud emas!!!</h2>
    <hr>
    <div>
        {% if page_obj.has_previous %}
            <a href="?page={{ page_obj.previous_page_number }}{% if query %}&q={{ query }}{% endif %}"><button type="submit">Oldingi</button></a>
        {% endif %}
        <span>{{ page_obj.number }}</span>
        {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}{% if query %}&q={{ query }}{% endif %}"><button type="submit">Keyingi</button></a>
        {% endif %}
        </div>
    
    
</body>
</html>

</body>
</html>
