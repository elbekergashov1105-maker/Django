{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="POST">
        {% csrf_token %}
        <label type="text">Title</label>
        <input type="text" name="title" value="{{post.title}}"><br><br>
        <label type="text" >Content</label>
        <input type="text" name="content" value="{{post.content}}"><br><br>
        <label type="text">Author</label>
        <input type="text" name="author" value="{{post.author}}"><br><br>
        <button type="submit">Saqlash</button>
    </form>
    <a href="{% url 'post_detail' post.pk %}">Postlarga qaytish</a><br>

</body>
</html>
