{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
</head>
<body>
    <h1>Yangi qo'shish</h1>
    {% if error %}
        <h2>{{ error }}</h2>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="title"><br><br>
        <label type="text">Content</label>
        <input type="text" name="content"><br><br>
        <label type="text">Author</label>
        <input type="text" name="author"><br><br>
        <button type="submit">Saqlash</button>
    </form>
    <a href="{% url 'posts' %}">Postlarga qaytish</a><br>
    



</body>
</html>
